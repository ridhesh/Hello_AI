<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: var(--card);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header {
            padding: 24px;
            background: var(--glass);
            border-bottom: 1px solid var(--glass);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-thumb { background: var(--glass); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background: var(--glass);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass);
        }

        .input-area {
            padding: 24px;
            background: var(--glass);
            border-top: 1px solid var(--glass);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid var(--glass);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: var(--primary-hover); transform: scale(1.02); }
        button:active { transform: scale(0.98); }

        .typing {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="status"></div>
            <h1>AI Support Agent</h1>
        </div>
        <div class="messages" id="messages">
            <div class="message ai">Hello! I'm your AI support assistant. How can I help you today?</div>
        </div>
        <div class="typing" id="typing" style="padding: 0 24px;">AI is thinking...</div>
        <form class="input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="Ask about an order, refund, or billing..." autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const messages = document.getElementById('messages');
        const typing = document.getElementById('typing');
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            typing.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': 'secret-token-123'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text
                    })
                });

                const data = await response.json();
                typing.style.display = 'none';
                
                if (data.reply) {
                    addMessage(data.reply, 'ai');
                } else {
                    addMessage("Sorry, I encountered an error. Please try again.", 'ai');
                }
            } catch (err) {
                typing.style.display = 'none';
                addMessage("Connection error. Is the server running?", 'ai');
            }
        };
    </script>
</body>
</html>
