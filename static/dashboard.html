<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #f43f5e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px;
            background: radial-gradient(circle at bottom left, #450a0a, #0f172a);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            background: linear-gradient(to right, #fb7185, #e11d48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .refresh-btn {
            background: var(--glass);
            border: 1px solid var(--glass);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .refresh-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .ticket-card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--glass);
            transition: transform 0.2s;
            animation: fadeIn 0.4s ease-out;
        }

        .ticket-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .ticket-id {
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
            text-transform: uppercase;
        }

        .ticket-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        .ticket-reason {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .ticket-footer {
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--glass);
            padding-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-dot {
            width: 8px;
            height: 8px;
            background: #38bdf8;
            border-radius: 50%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 100px;
            color: var(--text-muted);
            background: var(--glass);
            border-radius: 24px;
            border: 2px dashed var(--glass);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Support Tickets</h1>
            <button class="refresh-btn" onclick="fetchTickets()">Refresh Dashboard</button>
        </header>

        <div class="ticket-grid" id="ticket-grid">
            <!-- Tickets will appear here -->
        </div>
    </div>

    <script>
        async function fetchTickets() {
            const grid = document.getElementById('ticket-grid');
            try {
                const response = await fetch('/tickets');
                const tickets = await response.json();

                if (tickets.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No open tickets. AI is handling everything! 🚀</div>';
                    return;
                }

                grid.innerHTML = tickets.map(t => `
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <span class="ticket-id">Ticket #${t.id}</span>
                            <span class="ticket-date">${new Date(t.created_at).toLocaleString()}</span>
                        </div>
                        <div class="ticket-reason">${t.reason}</div>
                        <div class="ticket-footer">
                            <div class="session-dot"></div>
                            User: ${t.session_id}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<div class="empty-state">Error loading tickets. Ensure API is running.</div>';
            }
        }

        fetchTickets();
        setInterval(fetchTickets, 30000); // Auto-refresh every 30s
    </script>
</body>
</html>
